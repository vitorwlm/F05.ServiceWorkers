<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
</head>
<body>
    <h1>Pomodoro Timer App</h1>
    <h2>Welcome to the Pomodoro Timer App!</h2>

    <script src="scripts/dataHandle.js"></script>
</body>
